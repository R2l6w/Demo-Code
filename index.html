<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الولاء الذكي</title>
    <style>
        /* جعل الصورة البرمجية للمهن هي الخلفية الكاملة والممتدة للموقع */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* تصميم خلفية مدمجة تجمع بين الألوان الداكنة والرسومات */
            background-color: #111;
            background-image: 
                linear-gradient(to bottom, rgba(17, 17, 17, 0.85), rgba(17, 17, 17, 0.95)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" opacity="0.15"><path d="M20 20h10v10H20zM50 20h10v10H50zM80 20h10v10H80z" fill="white"/></svg>');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* حاوية المحتوى أصبحت بدون خلفية سوداء (شفافة تماماً) لتظهر صورة الخلفية */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* الأيقونات البرمجية للمهن تطفو الآن في الأعلى بشكل حر وبدون مستطيل */
        .top-professions {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }
        .top-professions svg {
            width: 40px;
            height: 40px;
            fill: #a29bfe;
            filter: drop-shadow(0 0 8px rgba(162, 155, 254, 0.6));
        }

        h1 { font-size: 26px; margin: 10px 0 5px 0; color: #ffffff; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        p { font-size: 15px; color: #cccccc; margin-bottom: 30px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stamp-box {
            position: relative;
            width: 95px;
            height: 95px;
            margin: auto;
            border: 2px dashed rgba(255, 255, 255, 0.2); 
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(5px);
            transition: 0.3s ease;
        }
        .stamp-box .emoji {
            font-size: 30px;
        }
        .stamp-box.active {
            background-color: #2ecc71; 
            color: white;
            border: 2px solid #27ae60;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }
        
        .stamp-date {
            font-size: 9px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
            border-radius: 5px;
            margin-top: 4px;
            direction: ltr;
        }
        
        .btn-admin {
            background-color: rgba(255, 255, 255, 0.1); 
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 25px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        .btn-admin:hover { background-color: rgba(255, 255, 255, 0.2); }

        .social-channels {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            display: flex;
            justify-content: space-around;
            gap: 12px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .btn-whatsapp {
            background-color: #25D366;
        }
        .social-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-professions">
            <svg viewBox="0 0 24 24"><path d="M19 3c-.55 0-1 .45-1 1v1.17l-2.05 2.05C15.39 7.08 14.73 7 14 7c-.55 0-1 .45-1 1s.45 1 1 1c.53 0 1.04.08 1.54.22L12 13.76l-3.54-3.54c.5-.14 1.01-.22 1.54-.22.55 0 1-.45 1-1s-.45-1-1-1c-.73 0-1.39.08-1.95.22L6 6.17V4c0-.55-.45-1-1-1s-1 .45-1 1v3c0 .27.11.52.29.71L7.59 11l-3.3 3.3c-.76-.43-1.63-.68-2.54-.68-.28 0-.53.22-.55.5-.02.3.2.56.5.56.74 0 1.45.22 2.05.6l-2.05 2.05V19c0 .55.45 1 1 1s1-.45 1-1v-1.17l2.05-2.05c.56.38 1.27.6 2.05.6.28 0 .5-.25.5-.53 0-.27-.2-.47-.46-.49-.91 0-1.78-.25-2.54-.68l3.3-3.3 3.54 3.54c-.14.5-.22 1.01-.22 1.54 0 .55.45 1 1 1s1-.45 1-1c0-.53.08-1.04.22-1.54L18 13.76l3.54 3.54c-.14.5-.22 1.01-.22 1.54 0 .55.45 1 1 1s1-.45 1-1c0-.73-.08-1.39-.22-1.95L23.71 13.3c.18-.19.29-.44.29-.71v-3c0-.55-.45-1-1-1s-1 .45-1 1v1.17l-2.05-2.05C20.5 7.31 21 6.2 21 5c0-.55-.45-1-1-1zm-5 13.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 11v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-4.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 10l1.5-4.5h11L19 10H5z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>

        <h1>نظام الولاء الذكي</h1>
        <p>اجمع 5 أختام واحصل على مكافأتك السادسة مجاناً!</p>

        <div class="stamps-grid" id="stampsGrid">
            </div>

        <button class="btn-admin" onclick="addStamp()">إضافة ختم (للموظف فقط)</button>

        <div class="social-channels">
            <a href="https://instagram.com/r2l6w" target="_blank" class="social-btn btn-instagram">
                📸 @r2l6w
            </a>
            <a href="https://wa.me/9647722394090" target="_blank" class="social-btn btn-whatsapp">
                💬 واتساب
            </a>
        </div>
    </div>

    <script>
        const totalStamps = 6;
        let currentStamps = localStorage.getItem('demo_stamps') ? parseInt(localStorage.getItem('demo_stamps')) : 0;
        let stampDates = localStorage.getItem('stamp_dates') ? JSON.parse(localStorage.getItem('stamp_dates')) : [];
        const secretCode = "0000"; 

        function renderStamps() {
            const grid = document.getElementById('stampsGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= totalStamps; i++) {
                const box = document.createElement('div');
                box.className = 'stamp-box ' + (i <= currentStamps ? 'active' : '');
                
                const emojiSpan = document.createElement('span');
                emojiSpan.className = 'emoji';
                
                if (i <= currentStamps) {
                    emojiSpan.innerHTML = '⭐'; 
                    box.appendChild(emojiSpan);
                    
                    if (stampDates[i - 1]) {
                        const dateSpan = document.createElement('span');
                        dateSpan.className = 'stamp-date';
                        dateSpan.innerText = stampDates[i - 1];
                        box.appendChild(dateSpan);
                    }
                } else {
                    emojiSpan.innerHTML = (i === totalStamps) ? '🎁' : '';
                    box.appendChild(emojiSpan);
                }
                
                grid.appendChild(box);
            }
        }

        function addStamp() {
            if (currentStamps >= totalStamps) {
                alert("تهانينا! البطاقة مكتملة. يستحق العميل هديته.");
                if(confirm("هل تريد تصفير البطاقة للبدء من جديد؟")) {
                    currentStamps = 0;
                    stampDates = [];
                    localStorage.setItem('demo_stamps', currentStamps);
                    localStorage.setItem('stamp_dates', JSON.stringify(stampDates));
                    renderStamps();
                }
                return;
            }

            const codeInput = prompt("الرجاء إدخال الرمز السري للموظف:");
            if (codeInput === secretCode) {
                const now = new Date();
                const timeString = now.toLocaleDateString('ar-EG', {month:'numeric', day:'numeric'}) + " " + now.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});
                
                stampDates.push(timeString);
                currentStamps++;
                
                localStorage.setItem('demo_stamps', currentStamps);
                localStorage.setItem('stamp_dates', JSON.stringify(stampDates));
                
                renderStamps();
                
                if (currentStamps === totalStamps) {
                    setTimeout(() => alert("اكتملت البطاقة! يستحق العميل الجائزة الآن."), 300);
                }
            } else if (codeInput !== null) {
                alert("الرمز السري غير صحيح!");
            }
        }

        renderStamps();
    </script>
</body>
</html>
