<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة الولاء الذكية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9; 
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #fff;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        
        /* قسم التاريخ والوقت */
        .datetime-picker {
            font-size: 13px;
            color: #777;
            margin-bottom: 15px;
            background: #f8f9fa;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        /* قسم صورة المهن */
        .business-banner {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        h1 { font-size: 22px; margin: 10px 0 5px 0; color: #2d3436; }
        p { font-size: 14px; color: #636e72; margin-bottom: 20px; }
        
        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stamp-box {
            width: 80px;
            height: 80px;
            margin: auto;
            border: 2px dashed #dfe6e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background-color: #fafafa;
            transition: 0.3s ease;
        }
        .stamp-box.active {
            background-color: #2ecc71;
            color: white;
            border: 2px solid #27ae60;
            transform: scale(1.05);
        }
        
        .btn-admin {
            background-color: #2d3436;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .btn-admin:hover { background-color: #4b5563; }

        /* قسم وسائل التواصل الاجتماعي */
        .social-channels {
            border-top: 1px solid #eee;
            padding-top: 15px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .btn-whatsapp {
            background-color: #25D366;
        }
        .social-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. عرض التاريخ والوقت الحقيقي -->
        <div class="datetime-picker" id="liveClock">جاري تحميل الوقت...</div>

        <!-- 2. صورة تجمع المهن (يمكنك استبدال الايموجيات برابط صورة حقيقية في كود src لاحقاً) -->
        <div class="business-banner">
            ☕ 💇‍♂️ 🛍️ 🍕 💅
        </div>

        <h1>نظام الولاء الذكي</h1>
        <p>اجمع 5 أختام واحصل على مكافأتك السادسة مجاناً!</p>

        <div class="stamps-grid" id="stampsGrid">
            <!-- سيتم توليد الأختام هنا بواسطة الجافاسكربت -->
        </div>

        <button class="btn-admin" onclick="addStamp()">إضافة ختم (للموظف فقط)</button>

        <!-- 3. إضافة الرقم وانستغرام -->
        <div class="social-channels">
            <!-- استبدل الرابط برابط حساب الانستغرام الحقيقي -->
            <a href="https://instagram.com/username" target="_blank" class="social-btn btn-instagram">
                📸 انستغرام
            </a>
            <!-- استبدل الرقم برقم الواتساب الحقيقي (اكتبه بدون أصفار أو علامة + في الرابط) -->
            <a href="https://wa.me/9647500000000" target="_blank" class="social-btn btn-whatsapp">
                💬 واتساب
            </a>
        </div>
    </div>

    <script>
        const totalStamps = 6;
        let currentStamps = localStorage.getItem('demo_stamps') ? parseInt(localStorage.getItem('demo_stamps')) : 0;
        const secretCode = "0000"; 

        // دالة تحديث الوقت والتاريخ تلقائياً
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('liveClock').innerText = now.toLocaleDateString('ar-EG', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderStamps() {
            const grid = document.getElementById('stampsGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= totalStamps; i++) {
                const box = document.createElement('div');
                box.className = 'stamp-box ' + (i <= currentStamps ? 'active' : '');
                
                if (i <= currentStamps) {
                    box.innerHTML = '⭐'; 
                } else if (i === totalStamps) {
                    box.innerHTML = '🎁'; 
                }
                
                grid.appendChild(box);
            }
        }

        function addStamp() {
            if (currentStamps >= totalStamps) {
                alert("تهانينا! البطاقة مكتملة. يستحق العميل هديته.");
                if(confirm("هل تريد تصفير البطاقة للبدء من جديد؟")) {
                    currentStamps = 0;
                    localStorage.setItem('demo_stamps', currentStamps);
                    renderStamps();
                }
                return;
            }

            const codeInput = prompt("الرجاء إدخال الرمز السري للموظف:");
            if (codeInput === secretCode) {
                currentStamps++;
                localStorage.setItem('demo_stamps', currentStamps);
                renderStamps();
                
                if (currentStamps === totalStamps) {
                    setTimeout(() => alert("اكتملت البطاقة! يستحق العميل الجائزة الآن."), 300);
                }
            } else if (codeInput !== null) {
                alert("الرمز السري غير صحيح!");
            }
        }

        renderStamps();
    </script>
</body>
</html>
