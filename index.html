<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة الولاء الذكية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa; 
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #2d3436;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: #ffffff; 
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }
        
        /* قسم البانر المخصص لصورة المهن */
        .business-banner {
            width: 100%;
            height: 140px;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .business-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* لضمان تناسق أبعاد الصورة المدمجة داخل الإطار */
        }

        h1 { font-size: 22px; margin: 10px 0 5px 0; color: #2d3436; }
        p { font-size: 14px; color: #636e72; margin-bottom: 20px; }
        
        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stamp-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin: auto;
            border: 2px dashed #b2bec3; 
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f1f2f6; 
            transition: 0.3s ease;
        }
        .stamp-box .emoji {
            font-size: 28px;
        }
        .stamp-box.active {
            background-color: #2ecc71; 
            color: white;
            border: 2px solid #27ae60;
            transform: scale(1.05);
        }
        
        .stamp-date {
            font-size: 9px;
            color: #fff;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 4px;
            border-radius: 5px;
            margin-top: 4px;
            direction: ltr;
        }
        
        .btn-admin {
            background-color: #ced6e0; 
            color: #2d3436;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .btn-admin:hover { background-color: #dfe4ea; }

        .social-channels {
            border-top: 1px solid #f1f2f6;
            padding-top: 15px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .btn-whatsapp {
            background-color: #25D366;
        }
        .social-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الصورة المدمجة للمهن (الحلاق، الكاشير، غسيل السيارات) -->
        <div class="business-banner">
            <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80&w=600" alt="صورة المهن والخدمات المشتركة">
        </div>

        <h1>نظام الولاء الذكي</h1>
        <p>اجمع 5 أختام واحصل على مكافأتك السادسة مجاناً!</p>

        <div class="stamps-grid" id="stampsGrid">
            <!-- سيتم توليد الأختام والتاريخ بواسطة الجافاسكربت -->
        </div>

        <button class="btn-admin" onclick="addStamp()">إضافة ختم (للموظف فقط)</button>

        <div class="social-channels">
            <a href="https://instagram.com/r2l6w" target="_blank" class="social-btn btn-instagram">
                📸 @r2l6w
            </a>
            <a href="https://wa.me/9647722394090" target="_blank" class="social-btn btn-whatsapp">
                💬 واتساب
            </a>
        </div>
    </div>

    <script>
        const totalStamps = 6;
        let currentStamps = localStorage.getItem('demo_stamps') ? parseInt(localStorage.getItem('demo_stamps')) : 0;
        let stampDates = localStorage.getItem('stamp_dates') ? JSON.parse(localStorage.getItem('stamp_dates')) : [];
        const secretCode = "0000"; 

        function renderStamps() {
            const grid = document.getElementById('stampsGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= totalStamps; i++) {
                const box = document.createElement('div');
                box.className = 'stamp-box ' + (i <= currentStamps ? 'active' : '');
                
                const emojiSpan = document.createElement('span');
                emojiSpan.className = 'emoji';
                
                if (i <= currentStamps) {
                    emojiSpan.innerHTML = '⭐'; 
                    box.appendChild(emojiSpan);
                    
                    if (stampDates[i - 1]) {
                        const dateSpan = document.createElement('span');
                        dateSpan.className = 'stamp-date';
                        dateSpan.innerText = stampDates[i - 1];
                        box.appendChild(dateSpan);
                    }
                } else {
                    emojiSpan.innerHTML = (i === totalStamps) ? '🎁' : '';
                    box.appendChild(emojiSpan);
                }
                
                grid.appendChild(box);
            }
        }

        function addStamp() {
            if (currentStamps >= totalStamps) {
                alert("تهانينا! البطاقة مكتملة. يستحق العميل هديته.");
                if(confirm("هل تريد تصفير البطاقة للبدء من جديد؟")) {
                    currentStamps = 0;
                    stampDates = [];
                    localStorage.setItem('demo_stamps', currentStamps);
                    localStorage.setItem('stamp_dates', JSON.stringify(stampDates));
                    renderStamps();
                }
                return;
            }

            const codeInput = prompt("الرجاء إدخال الرمز السري للموظف:");
            if (codeInput === secretCode) {
                const now = new Date();
                const timeString = now.toLocaleDateString('ar-EG', {month:'numeric', day:'numeric'}) + " " + now.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});
                
                stampDates.push(timeString);
                currentStamps++;
                
                localStorage.setItem('demo_stamps', currentStamps);
                localStorage.setItem('stamp_dates', JSON.stringify(stampDates));
                
                renderStamps();
                
                if (currentStamps === totalStamps) {
                    setTimeout(() => alert("اكتملت البطاقة! يستحق العميل الجائزة الآن."), 300);
                }
            } else if (codeInput !== null) {
                alert("الرمز السري غير صحيح!");
            }
        }

        renderStamps();
    </script>
</body>
</html>
